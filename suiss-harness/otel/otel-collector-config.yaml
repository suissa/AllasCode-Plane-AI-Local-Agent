receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  batch:
  resourcedetection:
    detectors: [env, system]

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889" # Internal for Prometheus to scrape
  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"
  otlp:
    endpoint: "tempo:4317"
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, resourcedetection]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch, resourcedetection]
      exporters: [loki]
    traces:
      receivers: [otlp]
      processors: [batch, resourcedetection]
      exporters: [otlp]
