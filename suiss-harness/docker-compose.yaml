version: '3.8'

services:
  # 1. Redis (Cache) - Port 4004
  redis:
    image: redis:alpine
    container_name: suiss-redis
    ports:
      - "4004:6379"
    networks:
      - suiss-network

  # 2. NATS (Queue/JetStream) - Port 4005
  nats:
    image: nats:latest
    container_name: suiss-nats
    ports:
      - "4005:4222"
    command: ["-js"]
    networks:
      - suiss-network

  # 3. Postgres (Write/CDC) - Port 4006
  postgres:
    image: postgres:15-alpine
    container_name: suiss-postgres
    environment:
      POSTGRES_USER: suiss_user
      POSTGRES_PASSWORD: suiss_password
      POSTGRES_DB: suiss_db
    ports:
      - "4006:5432"
    command: ["postgres", "-c", "wal_level=logical"]
    networks:
      - suiss-network

  # 4. MongoDB (Read) - Port 4007
  mongodb:
    image: mongo:latest
    container_name: suiss-mongodb
    ports:
      - "4007:27017"
    networks:
      - suiss-network

  # 5. Milvus (Vector) - Port 4008
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: suiss-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - suiss-network

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: suiss-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: server /data
    networks:
      - suiss-network

  milvus:
    image: milvusdb/milvus:v2.3.0
    container_name: suiss-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "4008:19530"
    depends_on:
      - etcd
      - minio
    networks:
      - suiss-network

  # 6. Neo4j (Graph) - Ports 4009, 4010
  neo4j:
    image: neo4j:latest
    container_name: suiss-neo4j
    environment:
      NEO4J_AUTH: neo4j/suiss_password
    ports:
      - "4009:7474" # HTTP
      - "4010:7687" # Bolt
    networks:
      - suiss-network

  # 7. EventStoreDB (Event Sourcing) - Port 4011
  eventstoredb:
    image: eventstore/eventstore:latest
    container_name: suiss-eventstoredb
    environment:
      EVENTSTORE_INSECURE: "true"
      EVENTSTORE_RUN_PROJECTIONS: "All"
      EVENTSTORE_START_STANDARD_PROJECTIONS: "true"
    ports:
      - "4011:2113"
    networks:
      - suiss-network

  # 8. Prometheus (Metrics) - Port 4012
  prometheus:
    image: prom/prometheus:latest
    container_name: suiss-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "4012:9090"
    networks:
      - suiss-network

  # 9. Loki (Logs) - Port 4013
  loki:
    image: grafana/loki:latest
    container_name: suiss-loki
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "4013:3100"
    networks:
      - suiss-network

  # 10. Tempo (Traces) - Port 4014
  tempo:
    image: grafana/tempo:latest
    container_name: suiss-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo/tempo-config.yaml:/etc/tempo.yaml
    ports:
      - "4014:3200"
    networks:
      - suiss-network

  # 11. Grafana (Dashboard) - Port 4015
  grafana:
    image: grafana/grafana:latest
    container_name: suiss-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "4015:3000"
    networks:
      - suiss-network

  # 12. Otel Collector - Ports 4016, 4017
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: suiss-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4016:4317" # OTLP gRPC
      - "4017:4318" # OTLP HTTP
    networks:
      - suiss-network

  # 13. Debezium Server (CDC to NATS) - Port 4018
  debezium:
    image: debezium/server:latest
    container_name: suiss-debezium
    volumes:
      - ./debezium/conf:/debezium/conf
    ports:
      - "4018:8080"
    depends_on:
      - postgres
      - nats
    networks:
      - suiss-network

networks:
  suiss-network:
    driver: bridge
